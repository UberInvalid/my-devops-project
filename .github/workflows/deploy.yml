name: Build and push Docker image

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Test secrets existence
  run: |
    if [ -z "${{ secrets.DOCKER_USERNAME }}" ]; then
      echo "ERROR: DOCKER_USERNAME is empty"
      exit 1
    else
      echo "DOCKER_USERNAME is set (length: ${#DOCKER_USERNAME})"
      echo "First/last char: ${DOCKER_USERNAME:0:1}...${DOCKER_USERNAME: -1}"
    fi
    if [ -z "${{ secrets.DOCKER_PASSWORD }}" ]; then
      echo "ERROR: DOCKER_PASSWORD is empty"
      exit 1
    else
      echo "DOCKER_PASSWORD is set (length: ${#DOCKER_PASSWORD})"
      echo "Starts with: ${DOCKER_PASSWORD:0:6}..."
    fi
  env:
    DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
    DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
      
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      
      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/my-devops-project:latest
