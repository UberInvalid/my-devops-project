name: Build, push and deploy with bore

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/my-devops-project:latest

      - name: Run container and check
        run: |
          docker run -d -p 8080:80 --name my-site ${{ secrets.DOCKER_USERNAME }}/my-devops-project:latest
          sleep 5
          docker ps -a
          curl -s -o /dev/null -w "%{http_code}" http://localhost:8080 || true
          echo ""
          echo "Контейнер должен быть жив. Запускаем туннель..."

      - name: Create tunnel with bore
        run: |
          # Скачиваем и распаковываем bore
          curl -L -o bore.tar.gz https://github.com/ekzhang/bore/releases/download/v0.5.0/bore-v0.5.0-x86_64-unknown-linux-musl.tar.gz
          tar xzf bore.tar.gz
          chmod +x bore
          # Запускаем bore, вывод пишем в файл
          ./bore local 8080 --to bore.pub > bore.log 2>&1 &
          # Ждём 8 секунд, чтобы bore точно поднялся и написал "listening at..."
          sleep 8
          # Читаем лог и ищем порт
          echo "=== Лог bore ==="
          cat bore.log
          echo "=== Конец лога ==="
          # Извлекаем порт (число после последнего двоеточия) и формируем ссылку
          PORT=$(grep -oP 'listening at bore\.pub:\K\d+' bore.log | tail -1)
          if [ -n "$PORT" ]; then
            echo "Публичная ссылка: http://bore.pub:$PORT"
          else
            echo "Не удалось извлечь порт. Открой лог выше и составь ссылку сам: http://bore.pub:ПОРТ"
          fi
          # Держим туннель ещё 2 минуты, чтобы ты успел открыть сайт
          sleep 120
