name: Build, push and deploy demo

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/my-devops-project:latest

      - name: Run container on runner
        run: |
          # Запускаем контейнер
          docker run -d -p 8080:80 --name my-site ${{ secrets.DOCKER_USERNAME }}/my-devops-project:latest
          # Ждём пару секунд для уверенности
          sleep 5
          # Проверяем, что контейнер жив
          docker ps -a
          # Смотрим логи контейнера (вдруг он упал)
          docker logs my-site
          # Проверяем, отвечает ли сам веб-сервер внутри контейнера
          curl -v http://localhost:8080 || true

      - name: Tunnel with bore (no token needed)
        run: |
          # Скачиваем и распаковываем bore
          curl -L -o bore.tar.gz https://github.com/ekzhang/bore/releases/download/v0.5.0/bore-v0.5.0-x86_64-unknown-linux-musl.tar.gz
          tar xzf bore.tar.gz
          chmod +x bore
          # Запускаем туннель на порт 8080 в фоне
          ./bore local 8080 --to bore.pub &
          # Даём ему время подняться
          sleep 5
          # Покажем логи, чтобы найти порт
          echo "Bore запущен. Ищи в логах строку 'listening at bore.pub:' ниже."
          # Ждём ещё минуту, чтобы ты успел открыть ссылку
          sleep 60
