name: Build, push and deploy demo

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/my-devops-project:latest

      - name: Run container on runner
        run: |
          # Запускаем контейнер
          docker run -d -p 8080:80 --name my-site ${{ secrets.DOCKER_USERNAME }}/my-devops-project:latest
          # Ждём пару секунд для уверенности
          sleep 5
          # Проверяем, что контейнер жив
          docker ps -a
          # Смотрим логи контейнера (вдруг он упал)
          docker logs my-site
          # Проверяем, отвечает ли сам веб-сервер внутри контейнера
          curl -v http://localhost:8080 || true

      - name: Install ngrok and create tunnel
        run: |
          curl -sSL https://ngrok-agent.s3.amazonaws.com/ngrok.asc | sudo tee /etc/apt/trusted.gpg.d/ngrok.asc >/dev/null
          echo "deb https://ngrok-agent.s3.amazonaws.com buster main" | sudo tee /etc/apt/sources.list.d/ngrok.list
          sudo apt-get update && sudo apt-get install ngrok
          ngrok config add-authtoken ${{ secrets.NGROK_AUTHTOKEN }}
          # Запускаем ngrok и пишем его логи в файл, чтобы видеть ошибки
          ngrok http 8080 --log=stdout > ngrok.log 2>&1 &
          # Ждём подольше (10 секунд), чтобы туннель точно поднялся
          sleep 10
          # Показываем, что ngrok жив
          ps aux | grep ngrok
          # Показываем первые 20 строк лога ngrok (вдруг там ошибка)
          head -n 20 ngrok.log
          # Пытаемся достать публичный URL
          curl -s localhost:4040/api/tunnels | jq -r '.tunnels[0].public_url' || echo "Не удалось получить URL, смотрим лог полностью:"
          cat ngrok.log
