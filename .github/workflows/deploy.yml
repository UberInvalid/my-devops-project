name: Build, push and deploy demo

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/my-devops-project:latest

      - name: Run container on runner
        run: |
          # Запускаем контейнер
          docker run -d -p 8080:80 --name my-site ${{ secrets.DOCKER_USERNAME }}/my-devops-project:latest
          # Ждём пару секунд для уверенности
          sleep 5
          # Проверяем, что контейнер жив
          docker ps -a
          # Смотрим логи контейнера (вдруг он упал)
          docker logs my-site
          # Проверяем, отвечает ли сам веб-сервер внутри контейнера
          curl -v http://localhost:8080 || true

      - name: Tunnel with localhost.run
        run: |
          # Запускаем SSH-туннель в фоне, пишем лог в файл
          ssh -o StrictHostKeyChecking=accept-new -R 80:localhost:8080 nokey@localhost.run > tunnel.log 2>&1 &
          # Ждём, чтобы туннель поднялся и URL появился
          sleep 10
          # Выводим лог, чтобы ты увидел ссылку
          echo "Лог туннеля (ищи строку с https://...localhost.run):"
          cat tunnel.log
          # Держим туннель ещё 60 секунд, чтобы ты успел открыть сайт
          sleep 60
